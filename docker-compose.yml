services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build: ./server
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/civic_hub
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      PORT: 4000
    depends_on:
      mongo:
        condition: service_healthy

  web:
    build: ./client
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - server

volumes:
  mongo-data:
